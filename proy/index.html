<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SchoolHub | Sistema de Gestión Escolar</title>
    <!-- Iconos FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- jsPDF para generación de reportes PDF (RF-17) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.1/jspdf.plugin.autotable.min.js"></script>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <!-- Vista de Inicio de Sesión -->
    <div id="login-view" class="flex items-center justify-center h-screen w-full">
        <div class="login-card text-center">
            <div class="logo-container">
                <div class="brand-logo">
                    <i class="fa-solid fa-graduation-cap"></i>
                </div>
                <h1 class="text-primary font-bold" style="font-size: 1.75rem;">SchoolHub</h1>
                <p class="text-sm text-muted" style="margin-top: 0.5rem;">Gestión Escolar</p>
            </div>

            <form id="login-form">
                <div class="input-group">
                    <label class="input-label" for="username">Identificador (Usuario/Email)</label>
                    <input type="text" id="username" class="input-field" placeholder="Ej. admin, 2020640..." required>
                </div>

                <div class="input-group">
                    <label class="input-label" for="password">Contraseña</label>
                    <div style="position: relative;">
                        <input type="password" id="password" class="input-field" placeholder="••••••••" required
                            style="padding-right: 2.5rem;">
                        <button type="button" id="toggle-password"
                            style="position: absolute; right: 0.75rem; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; color: var(--text-muted); padding: 0.25rem;">
                            <i class="fa-solid fa-eye" id="password-icon"></i>
                        </button>
                    </div>
                </div>

                <div class="flex justify-between items-center" style="margin-bottom: 1.5rem;">
                    <label class="flex items-center gap-2 text-sm text-muted" style="cursor: pointer;">
                        <input type="checkbox"> Recordarme
                    </label>
                    <a href="#" class="text-accent text-sm font-bold" style="text-decoration: none;">¿Olvidaste tu
                        contraseña?</a>
                </div>

                <button type="submit" class="btn btn-primary w-full">Iniciar Sesión</button>
            </form>

            <div class="text-sm text-muted" style="margin-top: 1.5rem;">
                ¿Problemas para acceder? <a href="#" class="text-primary font-bold"
                    style="text-decoration: none;">Contactar Soporte</a>
            </div>
        </div>
    </div>

    <!-- Vista del Panel de Control (Oculto Inicialmente) -->
    <div id="dashboard-view" class="app-container hidden">
        <!-- Barra Lateral -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <i class="fa-solid fa-graduation-cap"></i> SchoolHub
            </div>

            <nav id="sidebar-nav">
                <!-- Los elementos del menú se inyectan dinámicamente aquí -->
            </nav>

            <div style="margin-top: auto;">
                <button id="logout-btn" class="nav-item w-full"
                    style="background: rgba(255,255,255,0.1); border: none; cursor: pointer;">
                    <i class="fa-solid fa-arrow-right-from-bracket"></i> Cerrar Sesión
                </button>
            </div>
        </aside>

        <!-- Contenido Principal -->
        <main class="main-content">
            <!-- Barra Superior -->
            <header class="topbar">
                <h2 id="page-title" class="font-bold text-primary">Inicio</h2>

                <div class="user-profile">
                    <div class="text-right">
                        <div id="user-name" class="font-bold text-sm">Usuario</div>
                        <div id="user-role" class="text-xs text-muted">Rol</div>
                    </div>
                    <div class="avatar" id="user-avatar">U</div>
                </div>
            </header>

            <!-- Área de Contenido Dinámico -->
            <div id="main-container" class="content-area">
                <!-- Las vistas se inyectan aquí -->
                <div class="card">
                    <h3>Bienvenido al Panel</h3>
                    <p class="text-muted">Selecciona una opción del menú para comenzar.</p>
                </div>
            </div>
        </main>
    </div>

    <!-- Contenedor de Notificaciones -->
    <div id="toast" class="toast">Mensaje de notificación</div>

    <!-- Scripts cargados secuencialmente para compatibilidad -->
    <script src="js/db.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/app.js"></script>
</body>

</html>
